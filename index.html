  <script>
    // 防主题闪烁:在首帧前按 localStorage / 系统偏好设置 data-theme
    (function () {
      try {
        var s = localStorage.getItem('daum-theme');
        var t = (s === 'light' || s === 'dark')
          ? s
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <script>
    // 非首页刷新:必须在首帧前关掉自动滚位。否则浏览器在 Vue/ST 就绪前把
    // scrollY 拉到分区中段 → Hero 离屏、ScrollTrigger 直接 progress=1 钉停靠,
    // 开屏 handoff 飞向顶栏而非大标题,完整入场被短路。main.js 会在 boot 结束后
    // 按 sessionStorage 的 daum-scroll-y 还原。
    (function () {
      try {
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      } catch (e) {}
    })();
  </script>
  <script>
    // 旧版回流转场:带 ?from=legacy 或本次会话去过旧版(sessionStorage 标记),
    // 首帧前挂上到达幕布标记,body::after 以新版 --bg 满幅盖住,
    // main.js 在 boot 早期触发虹膜展开,与旧版离场虹膜同语言同节奏
    (function () {
      try {
        if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        var fromParam = /[?&]from=legacy(?:&|$)/.test(window.location.search);
        var flagged = sessionStorage.getItem('daum-legacy-visit') === '1';
        if (fromParam || flagged) {
          document.documentElement.setAttribute('data-from-legacy', '1');
        }
        sessionStorage.removeItem('daum-legacy-visit');
      } catch (e) {}
    })();
  </script>

  <!-- 无 JS 时隐藏 preloader,避免遮挡 noscript 提示 -->
  <noscript><style>#preloader { display: none !important; }</style></noscript>

  <!-- 首屏加载动画:内联令牌 + 样式,保证 dev/prod 首帧都不闪白屏 -->
  <style>
    /* ============================================================
       首屏加载动画 Preloader
       令牌与 src/styles/neu.css 同值,此处内联一份最小集:
       Vite dev 下 neu.css 经 JS 注入、首帧尚未就绪,内联令牌确保
       首帧即按 <html data-theme> 正确着色,暗色下绝不闪白屏。
       改 neu.css 令牌时请同步本块。
       ============================================================ */
    :root {
      --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
      --radius-full: 9999px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --pad: clamp(20px, 5vw, 48px);
    }
    :root,
    [data-theme='light'] {
      --bg: #fcfaf6;
      --bg-2: #ffffff;
      --text-dim: #78716c;
      --accent: #f59e0b;
      --accent-2: #fb923c;
      --accent-text: #b45309;
      --brand-ink: #e6cda6; /* 品牌名实色:浅色模式偏白浅橙;与 neu.css 同步 */
      --shadow-light: #ffffff;
      --shadow-dark: #ede0cf;
    }
    [data-theme='dark'] {
      --bg: #1a1410;
      --bg-2: #241c16;
      --text-dim: #a8967e;
      --accent: #fbbf24;
      --accent-2: #fb923c;
      --accent-text: #fbbf24;
      --brand-ink: #fbbf24;
      --shadow-light: #2a2018;
      --shadow-dark: #0d0a07;
    }
    /* body 背景首帧兜底:与 neu.css 同值;preloader 用不透明同款底遮住 #app,卸掉时零跳变 */
    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 8% 12%, rgba(216, 164, 127, 0.18) 0%, transparent 32%),
        radial-gradient(circle at 92% 8%, rgba(159, 180, 204, 0.16) 0%, transparent 28%),
        radial-gradient(circle at 50% 95%, rgba(232, 220, 200, 0.18) 0%, transparent 30%),
        radial-gradient(circle at 50% -10%, var(--bg-2), var(--bg) 55%);
      background-attachment: fixed;
    }
    /* boot 完成前只藏分页水印(非 Hero);#app 保持可测几何,供 handoff / ST。
       全屏遮罩靠 #preloader 不透明底,不再 visibility:hidden 整棵 #app
       (非首页刷新时会干扰 pin/量测,导致开屏无法走完整逻辑)。 */
    body[aria-busy="true"] main > .page {
      visibility: hidden;
    }
    /* .grad-text 首帧兜底(neu.css 加载前的同值再声明,加载后由 neu.css 接管,值一致无冲突) */
    .grad-text {
      background-image: linear-gradient(135deg, var(--accent-text), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    /* 品牌名实色:与开屏 SVG / Hero 标题同源 */
    .brand-ink,
    .hero-title .grad-text {
      background-image: none !important;
      background: none !important;
      -webkit-background-clip: border-box !important;
      background-clip: border-box !important;
      color: var(--brand-ink, var(--accent-text)) !important;
      -webkit-text-fill-color: var(--brand-ink, var(--accent-text)) !important;
    }

    /* ---------- 旧版回流到达幕布 ----------
       与旧版 .return-veil 离场互为逆过程:mask 虹膜开孔自同轴点放大揭示
       (fixed top/right 24px,48px 圆心 ≈ calc(100% - 48px) 48px),
       0.9s cubic-bezier(0.65,0,0.2,1);--iris-r 经 @property 注册可过渡,
       不支持的浏览器退化为瞬时揭示(无动画,不罩死)。 */
    @property --iris-r {
      syntax: '<length>';
      inherits: false;
      initial-value: 0px;
    }
    [data-from-legacy='1'] body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 10010;
      background: var(--bg);
      pointer-events: none;
      --iris-r: 0px;
      -webkit-mask-image: radial-gradient(circle var(--iris-r) at calc(100% - 48px) 48px, transparent calc(100% - 32px), #000 100%);
      mask-image: radial-gradient(circle var(--iris-r) at calc(100% - 48px) 48px, transparent calc(100% - 32px), #000 100%);
    }
    html.return-veil-open body::after {
      --iris-r: 150vmax;
      transition: --iris-r 0.9s cubic-bezier(0.65, 0, 0.2, 1);
    }
    @media (max-width: 640px) {
      [data-from-legacy='1'] body::after {
        -webkit-mask-image: radial-gradient(circle var(--iris-r) at calc(100% - 32px) 32px, transparent calc(100% - 32px), #000 100%);
        mask-image: radial-gradient(circle var(--iris-r) at calc(100% - 32px) 32px, transparent calc(100% - 32px), #000 100%);
      }
    }

    /* ---------- Preloader ----------
       流程(main.js):
       1) Outfit 800 轮廓 path 逐字描边+填实(实色 --brand-ink)
       2) 同色 HTML 字盖住墨迹,幕布硬切隐藏(无淡化)
       3) HTML 字 left/top/font-size 飞到 Hero
       4) 飞层盖住标题后亮 Hero,再卸飞层
    */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 4.5vh, 36px);
      padding: var(--pad);
      /* 不透明同款 body 底:挡住下方分区/社交;与 body 一致,is-done 硬切不闪 */
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 8% 12%, rgba(216, 164, 127, 0.18) 0%, transparent 32%),
        radial-gradient(circle at 92% 8%, rgba(159, 180, 204, 0.16) 0%, transparent 28%),
        radial-gradient(circle at 50% 95%, rgba(232, 220, 200, 0.18) 0%, transparent 30%),
        radial-gradient(circle at 50% -10%, var(--bg-2), var(--bg) 55%);
      background-attachment: fixed;
      animation: pl-stage-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes pl-stage-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    /* JS 硬切隐藏时用;兜底退场 */
    #preloader.is-done {
      pointer-events: none;
      opacity: 0 !important;
      visibility: hidden !important;
    }
    .preloader__brand-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: clamp(1.75rem, 7vw, 3.2rem);
    }
    .preloader__brand {
      display: block;
      height: 100%;
      width: auto;
      overflow: visible;
    }
    /* 加载进度条:loading 期间细轨;main.js 变形时再胀成 ThemeToggle 32px 轨 + thumb */
    .preloader__progress {
      width: clamp(150px, 34vw, 210px);
      height: 6px;
      border-radius: var(--radius-full);
      background: var(--bg-2);
      overflow: hidden;
    }
    .preloader__progress-fill {
      width: 0;
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--accent);
      /* 宽度由 main.js runProgressFill 驱动(与描边同窗,走满后无跳变再停顿) */
    }
    /* 描边 → 填实:同一实色,填完去掉描边 */
    .pl-char-path {
      fill: url(#plBrandGrad);
      fill-opacity: 0;
      stroke: color-mix(in srgb, var(--accent) 55%, white);
      stroke-width: 40;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: pl-draw 0.5s var(--ease) forwards;
      animation-delay: calc(var(--i) * 0.1s + 0.15s);
    }
    @keyframes pl-draw {
      0%   { stroke-dashoffset: 1; fill-opacity: 0; stroke-width: 40; }
      72%  { stroke-dashoffset: 0; fill-opacity: 0; stroke-width: 40; }
      100% { stroke-dashoffset: 0; fill-opacity: 1; stroke-width: 0; }
    }
    /* 飞行层(JS 创建) */
    .pl-fly {
      position: fixed;
      z-index: 10003;
      margin: 0;
      padding: 0;
      border: 0;
      display: inline-block;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      will-change: left, top, font-size;
    }
    @media (prefers-reduced-motion: reduce) {
      #preloader { animation: none !important; display: none !important; }
      .pl-char-path {
        animation: none !important;
        stroke-dashoffset: 0;
        fill-opacity: 1;
        stroke-width: 0;
      }
      .preloader__progress-fill {
        width: 100% !important;
        transition: none !important;
      }
    }
  </style>
</head>

  <script>
    // 兜底:即便模块加载失败,4.5s 后也强制收尾,防止卡死
    (function () {
      window.setTimeout(function () {
        // 到岸幕布兜底:模块失败时绝不能罩住页面
        document.documentElement.removeAttribute('data-from-legacy');
        document.documentElement.classList.remove('return-veil-open');
        var el = document.getElementById('preloader');
        if (el && el.dataset.done !== '1') {
          el.dataset.done = '1';
          el.classList.add('is-done');
          el.setAttribute('aria-hidden', 'true');
          if (el.parentNode) el.parentNode.removeChild(el);
        }
        // 揭示 Hero + 级联 reveal:优先用 main.js 挂载的共享收尾;
        // 模块加载失败时手动等价(否则 Hero 永久 opacity:0)
        if (typeof window.__finishBoot === 'function') {
          window.__finishBoot();
        } else {
          var t = document.querySelector('.hero-title');
          if (t) { t.classList.remove('handoff-pending'); t.classList.add('is-landed'); }
          document.querySelectorAll('.reveal-after-boot').forEach(function (n) {
            n.classList.add('is-visible');
          });
          document.body.setAttribute('aria-busy', 'false');
          document.documentElement.classList.add('boot-done');
        }
      }, 4500);
    })();
  </script>
