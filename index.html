  <script>
    // 防主题闪烁:在首帧前按 localStorage / 系统偏好设置 data-theme
    (function () {
      try {
        var s = localStorage.getItem('daum-theme');
        var t = (s === 'light' || s === 'dark')
          ? s
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <!-- 无 JS 时隐藏 preloader,避免遮挡 noscript 提示 -->
  <noscript><style>#preloader { display: none !important; }</style></noscript>

  <!-- 首屏加载动画:内联令牌 + 样式,保证 dev/prod 首帧都不闪白屏 -->
  <style>
    /* ============================================================
       首屏加载动画 Preloader
       令牌与 src/styles/neu.css 同值,此处内联一份最小集:
       Vite dev 下 neu.css 经 JS 注入、首帧尚未就绪,内联令牌确保
       首帧即按 <html data-theme> 正确着色,暗色下绝不闪白屏。
       改 neu.css 令牌时请同步本块。
       ============================================================ */
    :root {
      --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
      --radius-lg: 24px;
      --radius-full: 9999px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --pad: clamp(20px, 5vw, 48px);
      --dist: 3px;
      --blur: 8px;
      --dist-lg: 5px;
      --blur-lg: 12px;
    }
    :root,
    [data-theme='light'] {
      --bg: #f5f2ec;
      --bg-2: #fffcfa;
      --text-dim: #7d7a75;
      --accent: #9fb4cc;
      --accent-2: #d8a47f;
      --accent-text: #5c6f7f;
      --brand-ink: #a0785a; /* 品牌名实色:浅色模式暖棕桃;与 neu.css 同步 */
      --shadow-light: #ffffff;
      --shadow-dark: #e3e0d8;
    }
    [data-theme='dark'] {
      --bg: #2b2e35;
      --bg-2: #31343c;
      --text-dim: #9a9aa3;
      --accent: #f5b842;
      --accent-2: #e8723a;
      --accent-text: #f5b842;
      --brand-ink: #f5b842;
      --shadow-light: #363a42;
      --shadow-dark: #21242b;
    }
    /* .grad-text 首帧兜底(neu.css 加载前的同值再声明,加载后由 neu.css 接管,值一致无冲突) */
    .grad-text {
      background-image: linear-gradient(135deg, var(--accent-text), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }
    /* 品牌名实色:与开屏 SVG / Hero 标题同源 */
    .brand-ink,
    .hero-title .grad-text {
      background-image: none !important;
      background: none !important;
      -webkit-background-clip: border-box !important;
      background-clip: border-box !important;
      color: var(--brand-ink, var(--accent-text)) !important;
      -webkit-text-fill-color: var(--brand-ink, var(--accent-text)) !important;
    }

    /* ---------- Preloader ----------
       流程(main.js):
       1) Outfit 800 轮廓 path 逐字描边+填实(实色 --brand-ink)
       2) 同色 HTML 字盖住墨迹,幕布硬切隐藏(无淡化)
       3) HTML 字 left/top/font-size 飞到 Hero
       4) 飞层盖住标题后亮 Hero,再卸飞层
    */
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--pad);
      /* 背景与 neu.css body 完全一致(含 background-attachment: fixed):
         preloader 显示/隐藏时背景视觉完全相同,硬切零跳变--
         否则 preloader 的 radial-gradient 与 body 的另一套渐变硬切会闪一下。 */
      background: var(--bg);
      background-image:
        radial-gradient(circle at 8% 12%, rgba(216, 164, 127, 0.18) 0%, transparent 32%),
        radial-gradient(circle at 92% 8%, rgba(159, 180, 204, 0.16) 0%, transparent 28%),
        radial-gradient(circle at 50% 95%, rgba(232, 220, 200, 0.18) 0%, transparent 30%),
        radial-gradient(circle at 50% -10%, var(--bg-2), var(--bg) 55%);
      background-attachment: fixed;
      animation: pl-stage-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes pl-stage-in {
      from { opacity: 0; transform: scale(1.03); filter: blur(8px); }
      to   { opacity: 1; transform: scale(1);    filter: blur(0); }
    }
    /* JS 硬切隐藏时用;兜底退场 */
    #preloader.is-done {
      pointer-events: none;
      opacity: 0 !important;
      visibility: hidden !important;
    }
    .preloader__brand-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: clamp(1.75rem, 7vw, 3.2rem);
    }
    .preloader__brand {
      display: block;
      height: 100%;
      width: auto;
      overflow: visible;
    }
    /* 描边 → 填实:同一实色,填完去掉描边 */
    .pl-char-path {
      fill: var(--brand-ink, var(--accent-text));
      fill-opacity: 0;
      stroke: var(--brand-ink, var(--accent-text));
      stroke-width: 40;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: pl-draw 0.5s var(--ease) forwards;
      animation-delay: calc(var(--i) * 0.1s + 0.15s);
    }
    @keyframes pl-draw {
      0%   { stroke-dashoffset: 1; fill-opacity: 0; stroke-width: 40; }
      72%  { stroke-dashoffset: 0; fill-opacity: 0; stroke-width: 40; }
      100% { stroke-dashoffset: 0; fill-opacity: 1; stroke-width: 0; }
    }
    /* 飞行层(JS 创建) */
    .pl-fly {
      position: fixed;
      z-index: 10003;
      margin: 0;
      padding: 0;
      border: 0;
      display: inline-block;
      line-height: 1;
      white-space: nowrap;
      pointer-events: none;
      will-change: left, top, font-size;
    }
    @media (prefers-reduced-motion: reduce) {
      #preloader { animation: none !important; display: none !important; }
      .pl-char-path {
        animation: none !important;
        stroke-dashoffset: 0;
        fill-opacity: 1;
        stroke-width: 0;
      }
    }
  </style>
</head>

  <noscript>本站需要 JavaScript 运行,请启用后访问 daum.pw。</noscript>
  <script type="module" src="/src/main.js"></script>
  <script>
    // 兜底:即便模块加载失败,4.5s 后也强制收尾,防止卡死
    (function () {
      window.setTimeout(function () {
        var el = document.getElementById('preloader');
        if (el && el.dataset.done !== '1') {
          el.dataset.done = '1';
          el.classList.add('is-done');
          el.setAttribute('aria-hidden', 'true');
          if (el.parentNode) el.parentNode.removeChild(el);
        }
        // 揭示 Hero + 级联 reveal:优先用 main.js 挂载的共享收尾;
        // 模块加载失败时手动等价(否则 Hero 永久 opacity:0)
        if (typeof window.__finishBoot === 'function') {
          window.__finishBoot();
        } else {
          var t = document.querySelector('.hero-title');
          if (t) { t.classList.remove('handoff-pending'); t.classList.add('is-landed'); }
          document.querySelectorAll('.reveal-after-boot').forEach(function (n) {
            n.classList.add('is-visible');
          });
          document.body.setAttribute('aria-busy', 'false');
          document.documentElement.classList.add('boot-done');
        }
      }, 4500);
    })();
  </script>
